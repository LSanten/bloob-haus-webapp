<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube — bloob.haus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0b09;
      --surface: #171612;
      --surface2: #201e1a;
      --border: #2a2722;
      --accent: #d4a847;
      --accent-dim: rgba(212,168,71,0.12);
      --text: #ede8dc;
      --muted: #7a7060;
      --muted2: #4a4438;
      --danger: #c0674a;
      --radius: 6px;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    /* SETUP */
    .setup-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .setup-card { width: 100%; max-width: 480px; }
    .setup-title {
      font-size: 38px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .setup-subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .field-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--muted2); }
    .field-hint {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.7;
    }
    .field-hint a { color: var(--muted); text-decoration: none; border-bottom: 1px solid rgba(122,112,96,0.4); }
    .field-hint a:hover { color: var(--accent); border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0c0b09;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(192,103,74,0.1);
      border: 1px solid rgba(192,103,74,0.25);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--danger);
    }

    /* APP */
    .app-wrap { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .search-form {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 360px;
      max-width: 100%;
      transition: border-color 0.15s;
    }
    .search-form:focus-within { border-color: var(--accent); }
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 9px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: var(--muted2); }
    .search-btn {
      padding: 9px 14px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      transition: color 0.15s;
    }
    .search-btn:hover { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      margin-right: 2px;
    }
    .filter-pill {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--muted2); color: var(--text); }
    .filter-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn-filter {
      padding: 9px 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .btn-filter:hover { color: var(--text); }
    .btn-filter.active { color: var(--accent); }

    .main-content { flex: 1; padding: 28px 20px; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      gap: 12px;
    }
    .empty-icon { font-size: 40px; opacity: 0.3; }
    .empty-title { font-size: 18px; color: var(--muted); font-weight: 400; }
    .empty-sub { font-size: 13px; color: var(--muted2); }

    .results-header {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .video-card:hover { border-color: var(--muted2); transform: translateY(-2px); }
    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .video-info { padding: 12px; }
    .video-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-channel { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* PLAYER */
    .player-wrap { flex: 1; display: flex; flex-direction: column; }
    .player-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn-back:hover { color: var(--text); border-color: var(--muted); }
    .player-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-channel { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
    .player-frame-wrap {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .player-blocked {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }
    .player-blocked a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(212,168,71,0.3);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }
    .player-blocked a:hover { border-color: var(--accent); }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 0;
      justify-content: center;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    .app-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .footer-credit {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.03em;
    }
    .footer-credit a {
      color: var(--muted2);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-credit a:hover { color: var(--muted); }
    .btn-reset-key {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--muted2);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-reset-key:hover { color: var(--muted); border-color: var(--muted); }

    /* setup screen: column layout so footer sits at bottom */
    .setup-wrap { flex-direction: column; justify-content: flex-start; padding: 0; }
    .setup-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; width: 100%; }

    /* MOBILE */
    @media (max-width: 600px) {
      .topbar {
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 14px;
      }
      .topbar-left {
        width: 100%;
        gap: 10px;
      }
      .topbar-logo { display: none; }
      .search-form { width: 100%; flex: 1; }
      .topbar-right { margin-left: auto; }

      .main-content { padding: 16px 12px; }
      .results-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .video-info { padding: 8px; }
      .video-title { font-size: 12px; }

      .player-topbar {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 14px;
      }
      .player-channel { display: none; }

      /* iOS Safari zooms on focus if font-size < 16px */
      .search-input, .field-input { font-size: 16px; }
      .app-footer { padding: 8px 12px; }
      .footer-credit { font-size: 9px; }
      .filter-bar { padding: 8px 12px; gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LS_KEY = 'yt_bloob_api_key';

    function SetupScreen({ onSave }) {
      const [apiKey, setApiKey] = useState('');
      const [error, setError] = useState('');

      const handleSave = () => {
        const key = apiKey.trim();
        if (!key) { setError('API key is required to search.'); return; }
        localStorage.setItem(LS_KEY, key);
        onSave(key);
      };

      return (
        <div className="setup-wrap">
          <div className="setup-body">
            <div className="setup-card">
              <h1 className="setup-title">one-time setup</h1>
              <p className="setup-subtitle">
                your key is saved in this browser. you'll never see this screen again.
              </p>

              <input
                className="field-input"
                type="password"
                placeholder="AIzaSy..."
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSave()}
                autoFocus
              />
              <p className="field-hint">
                1.{' '}
                <a href="https://console.cloud.google.com/projectcreate" target="_blank" rel="noopener noreferrer">
                  Create a Google Cloud project
                </a>
                {'  →  '}
                2.{' '}
                <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank" rel="noopener noreferrer">
                  Enable YouTube Data API v3
                </a>
                {'  →  '}
                3.{' '}
                <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener noreferrer">
                  Create an API key
                </a>
                {' '}(Credentials → Create Credentials → API Key)
                <br />
                free quota: ~100 searches/day. key never leaves your browser.
              </p>

              {error && <div className="error-msg" style={{ marginTop: 16 }}>{error}</div>}

              <div style={{ marginTop: 28 }}>
                <button className="btn-primary" onClick={handleSave}>
                  save &amp; open →
                </button>
              </div>
            </div>
          </div>
          <Footer />
        </div>
      );
    }

    function PlayerScreen({ video, onBack, onReset }) {
      const { title, channelTitle } = video.snippet;
      const videoId = video.id.videoId;
      const [blocked, setBlocked] = useState(false);
      const iframeRef = useRef(null);

      useEffect(() => {
        function handleMessage(e) {
          try {
            const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
            // YouTube iframe API sends error codes via postMessage
            if (data?.event === 'onError' && [150, 151, 153].includes(data?.info)) {
              setBlocked(true);
            }
          } catch {}
        }
        window.addEventListener('message', handleMessage);
        return () => window.removeEventListener('message', handleMessage);
      }, []);

      return (
        <div className="player-wrap" style={{ height: '100vh' }}>
          <div className="player-topbar">
            <button className="btn-back" onClick={onBack}>← results</button>
            <div className="player-title">{title}</div>
            <div className="player-channel">{channelTitle}</div>
          </div>
          <div className="player-frame-wrap" style={{ flex: 1 }}>
            {blocked ? (
              <div className="player-blocked">
                <div>This video can't be embedded.</div>
                <a
                  href={`https://www.youtube.com/watch?v=${videoId}`}
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  watch on youtube →
                </a>
              </div>
            ) : (
              <iframe
                ref={iframeRef}
                src={`https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`}
                allow="autoplay; encrypted-media; fullscreen"
                allowFullScreen
              />
            )}
          </div>
          <Footer onReset={onReset} />
        </div>
      );
    }

    function App() {
      const savedKey = localStorage.getItem(LS_KEY) || '';

      const [setup, setSetup] = useState(!savedKey);
      const [apiKey, setApiKey] = useState(savedKey);
      const [draftQuery, setDraftQuery] = useState('');
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [selectedVideo, setSelectedVideo] = useState(null);
      const [showFilters, setShowFilters] = useState(false);
      const [filterOrder, setFilterOrder] = useState('relevance');
      const [filterDuration, setFilterDuration] = useState('');
      const [filterUpload, setFilterUpload] = useState('');

      const handleSaveSetup = (key) => {
        setApiKey(key);
        setSetup(false);
      };

      const handleResetKey = () => {
        localStorage.removeItem(LS_KEY);
        setApiKey('');
        setResults([]);
        setSetup(true);
      };

      const handleSearch = async (e) => {
        e?.preventDefault();
        const q = draftQuery.trim();
        if (!q) return;
        setQuery(q);
        setLoading(true);
        setError('');
        setResults([]);
        setSelectedVideo(null);
        try {
          const url = new URL('https://www.googleapis.com/youtube/v3/search');
          url.searchParams.set('part', 'snippet');
          url.searchParams.set('q', q);
          url.searchParams.set('maxResults', '18');
          url.searchParams.set('type', 'video');
          url.searchParams.set('order', filterOrder);
          if (filterDuration) url.searchParams.set('videoDuration', filterDuration);
          if (filterUpload) {
            const now = new Date();
            const days = { today: 1, week: 7, month: 30, year: 365 }[filterUpload];
            const after = new Date(now - days * 864e5);
            url.searchParams.set('publishedAfter', after.toISOString());
          }
          url.searchParams.set('key', apiKey);

          const res = await fetch(url.toString());
          const data = await res.json();

          if (data.error) {
            setError(data.error.message);
          } else {
            setResults(data.items || []);
          }
        } catch (err) {
          setError('Search failed: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      if (setup) return <SetupScreen onSave={handleSaveSetup} />;

      if (selectedVideo) {
        return <PlayerScreen video={selectedVideo} onBack={() => setSelectedVideo(null)} onReset={handleResetKey} />;
      }

      return (
        <div className="app-wrap">
          <div className="topbar">
            <div className="topbar-left">
              <span className="topbar-logo">▸ bloob / yt</span>
              <form className="search-form" onSubmit={handleSearch}>
                <input
                  className="search-input"
                  placeholder="search youtube..."
                  value={draftQuery}
                  onChange={e => setDraftQuery(e.target.value)}
                  autoFocus
                />
                <button className="search-btn" type="submit">⌕</button>
              </form>
              <button
                className={`btn-filter${showFilters ? ' active' : ''}`}
                type="button"
                onClick={() => setShowFilters(f => !f)}
              >
                {(filterOrder !== 'relevance' || filterDuration || filterUpload) ? '⊞ filter ·' : '⊞ filter'}
              </button>
            </div>
            <div className="topbar-right" />
          </div>

          {showFilters && (
            <div className="filter-bar">
              <div className="filter-group">
                <span className="filter-label">sort</span>
                {[['relevance','relevant'],['date','newest'],['rating','top rated'],['viewCount','most viewed']].map(([val, label]) => (
                  <button key={val} className={`filter-pill${filterOrder === val ? ' active' : ''}`} onClick={() => setFilterOrder(val)}>{label}</button>
                ))}
              </div>
              <div className="filter-group">
                <span className="filter-label">length</span>
                {[
                  ['','any'],
                  ['short','< 4 min'],
                  ['medium','4–20 min'],
                  ['long','> 20 min'],
                ].map(([val, label]) => (
                  <button key={val} className={`filter-pill${filterDuration === val ? ' active' : ''}`} onClick={() => setFilterDuration(val)}>{label}</button>
                ))}
              </div>
              <div className="filter-group">
                <span className="filter-label">uploaded</span>
                {[
                  ['','any time'],
                  ['today','today'],
                  ['week','this week'],
                  ['month','this month'],
                  ['year','this year'],
                ].map(([val, label]) => (
                  <button key={val} className={`filter-pill${filterUpload === val ? ' active' : ''}`} onClick={() => setFilterUpload(val)}>{label}</button>
                ))}
              </div>
            </div>
          )}

          <div className="main-content">
            {loading && (
              <div className="loading-row">
                <div className="spinner" />
                searching…
              </div>
            )}

            {error && (
              <div className="error-msg" style={{ marginBottom: 20 }}>
                {error}
              </div>
            )}

            {!loading && results.length > 0 && (
              <>
                <div className="results-header">
                  {results.length} results for "{query}"
                </div>
                <div className="results-grid">
                  {results.map(video => (
                    <div
                      key={video.id.videoId}
                      className="video-card"
                      onClick={() => setSelectedVideo(video)}
                    >
                      <img
                        className="video-thumb"
                        src={video.snippet.thumbnails?.medium?.url}
                        alt={video.snippet.title}
                        loading="lazy"
                      />
                      <div className="video-info">
                        <div className="video-title">{video.snippet.title}</div>
                        <div className="video-channel">{video.snippet.channelTitle}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {!loading && results.length === 0 && !error && (
              <div className="empty-state">
                <div className="empty-icon">▶</div>
                <div className="empty-title">search anything</div>
                <div className="empty-sub">your key stays in this browser, nothing is tracked</div>
              </div>
            )}
          </div>

          <Footer onSettings={() => setSetup(true)} onReset={handleResetKey} />
        </div>
      );
    }

    const Footer = ({ onReset, onSettings }) => (
      <div className="app-footer">
        <div className="footer-credit">
          developed by{' '}
          <a href="https://adrianfbotran.wixsite.com/portfolio" target="_blank" rel="noopener noreferrer">
            Adrian Botran
          </a>
          , who struggles to not be distracted on the youtube interface
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {onSettings && (
            <button className="btn-reset-key" onClick={onSettings}>settings</button>
          )}
          {onReset && (
            <button className="btn-reset-key" onClick={onReset}>reset key</button>
          )}
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
