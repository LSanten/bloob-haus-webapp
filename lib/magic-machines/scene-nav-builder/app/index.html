          <div style="font-size:10px;color:#8888aa;margin-bottom:4px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;">Mobile aspect ratio</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            ${MOBILE_ASPECT_RATIOS.map(ar => `<button class="mar-btn" data-ar="${esc(ar.value)}" style="padding:4px 6px;border-radius:5px;border:1px solid ${S.mobileAspectRatio===ar.value?'#69F0AE':'#1e1e30'};background:${S.mobileAspectRatio===ar.value?'#69F0AE14':'transparent'};color:${S.mobileAspectRatio===ar.value?'#69F0AE':'#8888aa'};cursor:pointer;font-size:10px;font-family:'Space Mono',monospace;transition:all 0.12s;">${esc(ar.label)}</button>`).join('')}
          </div>
        </div>
        <button id="mobile-bg-btn" style="width:100%;padding:7px;border-radius:6px;border:1px dashed #1e1e30;background:transparent;color:#8888aa;cursor:pointer;font-size:11px;transition:all 0.15s;">
          ＋ Add mobile backgrounds ${S.mobileBgs.length > 0 ? '('+S.mobileBgs.length+')' : ''}
        </button>
        <div style="font-size:9px;color:#505070;font-family:'Space Mono',monospace;margin-top:4px;line-height:1.4;">Use Desktop/Mobile toggle above canvas to reposition elements for mobile.</div>
      </div>
      ` : ''}
    </div>

    <div style="margin-bottom:14px;">
      <div style="font-size:10px;color:#7a7a9a;font-family:'Space Mono',monospace;
                  margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em;">Canvas background</div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:#8888aa;font-family:'Space Mono',monospace;width:50px;">Edit</span>
          <input id="bg-edit-color" type="color" value="${S.editBgColor}"
                 style="width:32px;height:22px;border:1px solid #1e1e30;border-radius:4px;background:transparent;cursor:pointer;padding:1px;" />
          <span style="font-size:10px;color:#505070;font-family:'Space Mono',monospace;">${S.editBgColor}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:#8888aa;font-family:'Space Mono',monospace;width:50px;">Preview</span>
          <input id="bg-preview-color" type="color" value="${S.previewBgColor}"
                 style="width:32px;height:22px;border:1px solid #1e1e30;border-radius:4px;background:transparent;cursor:pointer;padding:1px;" />
          <span style="font-size:10px;color:#505070;font-family:'Space Mono',monospace;">${S.previewBgColor}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:#8888aa;font-family:'Space Mono',monospace;width:50px;">Export</span>
          <input id="bg-export-color" type="color" value="${S.exportBgColor === 'transparent' ? '#000000' : S.exportBgColor}"
                 ${S.exportBgColor === 'transparent' ? 'disabled' : ''}
                 style="width:32px;height:22px;border:1px solid #1e1e30;border-radius:4px;background:transparent;cursor:pointer;padding:1px;opacity:${S.exportBgColor === 'transparent' ? '0.3' : '1'};" />
          <button id="bg-export-transparent" style="padding:3px 7px;border-radius:4px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;
              border:1px solid ${S.exportBgColor === 'transparent' ? '#FFD700' : '#1e1e30'};
              background:${S.exportBgColor === 'transparent' ? '#FFD70018' : 'transparent'};
              color:${S.exportBgColor === 'transparent' ? '#FFD700' : '#8888aa'};transition:all 0.12s;">
            transp.</button>
        </div>
      </div>
    </div>

    ${S.backgrounds.length > 0 ? `
    <div style="font-size:10px;color:#7a7a9a;font-family:'Space Mono',monospace;
                margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em;">
      Backgrounds · ${S.backgrounds.length}
    </div>
    ${bgListHtml}
    <div style="margin-top:10px;"></div>
    ` : ''}

    <div style="font-size:10px;color:#7a7a9a;font-family:'Space Mono',monospace;
                margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em;">
      Elements · ${S.elements.length}
    </div>

    ${listHtml}

    ${S.elements.length === 0 && S.backgrounds.length === 0 ? '<div style="text-align:center;padding:24px 8px;color:#505070;font-size:12px;line-height:1.7;">Upload a background,<br>then add character PNGs<br>to build your scene.</div>' : ''}

    ${bgPropsHtml}
    ${propsHtml}
  `;

  wireMobileControls();

  // Set thumbnail srcs via JS (data-URIs safe via property, not HTML attribute)
  panel.querySelectorAll('.bg-thumb').forEach(img => {
    const bg = S.backgrounds.find(b => b.id === img.dataset.bgid);
    if (bg) img.src = bg.src;
  });
  panel.querySelectorAll('.el-thumb').forEach(img => {
    const el = S.elements.find(e => e.id === img.dataset.elid);
    if (el) img.src = el.src;
  });

  // Upload buttons
  const bgBtn = document.getElementById('bg-btn');
  bgBtn.onclick      = () => document.getElementById('bg-input').click();
  bgBtn.onmouseenter = () => { bgBtn.style.borderColor = '#FFD700'; bgBtn.style.color = '#FFD700'; };
  bgBtn.onmouseleave = () => { bgBtn.style.borderColor = '#1e1e30'; bgBtn.style.color = '#8888aa'; };

  const elBtn = document.getElementById('el-btn');
  elBtn.onclick      = () => document.getElementById('el-input').click();
  elBtn.onmouseenter = () => { elBtn.style.borderColor = '#69F0AE'; elBtn.style.color = '#69F0AE'; };
  elBtn.onmouseleave = () => { elBtn.style.borderColor = '#1e1e30'; elBtn.style.color = '#8888aa'; };

  // Image prefix input
  const prefixInput = document.getElementById('image-prefix-input');
  prefixInput.addEventListener('input', () => { S.imagePrefix = prefixInput.value; });
  prefixInput.onfocus = e => e.target.style.borderColor = '#444';
  prefixInput.onblur  = e => e.target.style.borderColor = '#1e1e30';

  // Aspect ratio buttons
  panel.querySelectorAll('.ar-btn').forEach(btn => {
    btn.onclick = () => {
      S.aspectRatio = btn.dataset.ar;
      const container = document.getElementById('scene-container');
      if (container) container.style.aspectRatio = S.aspectRatio;
      renderLeftPanel();
    };
  });

  // Edge fade slider
  const edgeFadeInput = document.getElementById('edge-fade');
  if (edgeFadeInput) {
    edgeFadeInput.addEventListener('input', () => {
      S.edgeFade = Number(edgeFadeInput.value);
      const display = document.getElementById('edge-fade-display');
      if (display) display.textContent = S.edgeFade > 0 ? Math.round(S.edgeFade * 100) + '%' : 'off';
      renderCanvas();
    });
  }

  // Filter mode buttons
  panel.querySelectorAll('[data-fm]').forEach(btn => {
    btn.onclick = () => { S.filterMode = btn.dataset.fm; renderLeftPanel(); };
  });

  // Canvas background color handlers
  document.getElementById('bg-edit-color').addEventListener('input', e => {
    S.editBgColor = e.target.value;
    e.target.nextElementSibling.textContent = S.editBgColor;
    if (S.mode === 'edit') { const c = document.getElementById('scene-container'); if (c) c.style.background = S.editBgColor; }
  });
  document.getElementById('bg-preview-color').addEventListener('input', e => {
    S.previewBgColor = e.target.value;
    e.target.nextElementSibling.textContent = S.previewBgColor;
    if (S.mode === 'preview') { const c = document.getElementById('scene-container'); if (c) c.style.background = S.previewBgColor; }
  });
  document.getElementById('bg-export-color').addEventListener('input', e => {
    if (S.exportBgColor !== 'transparent') S.exportBgColor = e.target.value;
  });
  document.getElementById('bg-export-transparent').onclick = () => {
    if (S.exportBgColor === 'transparent') {
      const picker = document.getElementById('bg-export-color');
      S.exportBgColor = picker ? picker.value : '#000000';
    } else {
      S.exportBgColor = 'transparent';
    }
    renderLeftPanel();
  };

  // Background list → select
  panel.querySelectorAll('.bg-item').forEach(item => {
    item.onclick = () => { S.selectedId = item.dataset.bgid; renderLeftPanel(); renderCanvas(); };
  });

  // Element list → select
  panel.querySelectorAll('.el-item').forEach(item => {
    item.onclick = () => { S.selectedId = item.dataset.id; renderLeftPanel(); renderCanvas(); };
  });

  // Background properties handlers
  if (selBg) {
    const bgToOverride = S.canvasMode === 'mobile' && !isMobileBg(selBg);

    const bgScale = document.getElementById('bg-scale');
    bgScale.addEventListener('input', () => {
      const v = Number(bgScale.value);
      updateBg(selBg.id, { scale: v }, bgToOverride);
      document.getElementById('bg-scale-display').textContent = Math.round(v) + '%';
      const canvasEl = document.querySelector('.sn-bg-layer[data-bgid="' + selBg.id + '"]');
      if (canvasEl) canvasEl.style.width = v + '%';
    });

    const bgX = document.getElementById('bg-x');
    bgX.addEventListener('input', () => {
      const v = Number(bgX.value);
      updateBg(selBg.id, { x: v }, bgToOverride);
      document.getElementById('bg-x-display').textContent = Math.round(v) + '%';
      const canvasEl = document.querySelector('.sn-bg-layer[data-bgid="' + selBg.id + '"]');
      if (canvasEl) canvasEl.style.left = v + '%';
    });

    const bgY = document.getElementById('bg-y');
    bgY.addEventListener('input', () => {
      const v = Number(bgY.value);
      updateBg(selBg.id, { y: v }, bgToOverride);
      document.getElementById('bg-y-display').textContent = Math.round(v) + '%';
      const canvasEl = document.querySelector('.sn-bg-layer[data-bgid="' + selBg.id + '"]');
      if (canvasEl) canvasEl.style.top = v + '%';
    });

    const bgRotation = document.getElementById('bg-rotation');
    bgRotation.addEventListener('input', () => {
      const v = Number(bgRotation.value);
      updateBg(selBg.id, { rotation: v }, bgToOverride);
      document.getElementById('bg-rotation-display').textContent = v + '°';
      const canvasEl = document.querySelector('.sn-bg-layer[data-bgid="' + selBg.id + '"]');
      if (canvasEl) canvasEl.style.transform = v ? 'rotate(' + v + 'deg)' : '';
    });

    const removeBgBtn = document.getElementById('remove-bg-btn');
    removeBgBtn.onclick      = () => { removeBg(selBg.id); renderLeftPanel(); renderCanvas(); };
    removeBgBtn.onmouseenter = () => removeBgBtn.style.background = '#221111';
    removeBgBtn.onmouseleave = () => removeBgBtn.style.background = 'transparent';
  }

  if (!sel) return;

  // Element properties handlers
  const labelInput = document.getElementById('prop-label');
  labelInput.addEventListener('input', () => {
    updateEl(sel.id, { label: labelInput.value });
    const li = panel.querySelector('.el-item[data-id="' + sel.id + '"]');
    if (li) li.querySelector('div > div:first-child').textContent = labelInput.value || sel.fileName;
    const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
    if (canvasEl) { const lbl = canvasEl.querySelector('.sn-builder-label'); if (lbl) lbl.textContent = labelInput.value; }
  });
  labelInput.onfocus = e => e.target.style.borderColor = '#444';
  labelInput.onblur  = e => e.target.style.borderColor = '#1e1e30';

  const scaleInput = document.getElementById('prop-scale');
  scaleInput.addEventListener('input', () => {
    const v = Number(scaleInput.value);
    const writesToOverride = S.canvasMode === 'mobile' && sel.onlyShowOn !== 'mobile';
    if (writesToOverride) {
      if (!sel.mobileOverride) sel.mobileOverride = {};
      sel.mobileOverride.scale = v;
      updateEl(sel.id, { mobileOverride: { ...sel.mobileOverride } });
    } else {
      updateEl(sel.id, { scale: v });
    }
    document.getElementById('scale-display').textContent = Math.round(v) + '%';
    const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
    if (canvasEl) canvasEl.style.width = v + '%';
  });

  const rotationInput = document.getElementById('prop-rotation');
  rotationInput.addEventListener('input', () => {
    const v = Number(rotationInput.value);
    const writesToOverride = S.canvasMode === 'mobile' && sel.onlyShowOn !== 'mobile';
    if (writesToOverride) {
      if (!sel.mobileOverride) sel.mobileOverride = {};
      sel.mobileOverride.rotation = v;
      updateEl(sel.id, { mobileOverride: { ...sel.mobileOverride } });
    } else {
      updateEl(sel.id, { rotation: v });
    }
    document.getElementById('rotation-display').textContent = v + '°';
    const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
    if (canvasEl) {
      const ft = (sel.flipH ? ' scaleX(-1)' : '') + (sel.flipV ? ' scaleY(-1)' : '');
      canvasEl.style.transform = 'rotate(' + v + 'deg)' + ft;
    }
  });

  const resetRotInput = document.getElementById('prop-reset-rot');
  resetRotInput.addEventListener('change', () => updateEl(sel.id, { resetRotationOnHover: resetRotInput.checked }));

  const intensityInput = document.getElementById('prop-intensity');
  intensityInput.addEventListener('input', () => {
    const v = Number(intensityInput.value);
    updateEl(sel.id, { glowIntensity: v });
    document.getElementById('intensity-display').textContent = v.toFixed(1) + 'x';
  });

  panel.querySelectorAll('.glow-swatch').forEach(sw => {
    sw.onclick = () => {
      updateEl(sel.id, { glowColor: sw.dataset.color });
      const picker = document.getElementById('glow-color-picker');
      if (picker) picker.value = sw.dataset.color;
      renderLeftPanel();
      const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
      if (canvasEl) canvasEl.style.outline = '2px dashed ' + sw.dataset.color;
    };
  });

  const glowPicker = document.getElementById('glow-color-picker');
  if (glowPicker) {
    glowPicker.addEventListener('input', () => {
      updateEl(sel.id, { glowColor: glowPicker.value });
      renderLeftPanel();
      const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
      if (canvasEl) canvasEl.style.outline = '2px dashed ' + glowPicker.value;
    });
  }

  panel.querySelectorAll('.flip-btn').forEach(btn => {
    btn.onclick = () => {
      const isH = btn.dataset.flip === 'H';
      const patch = isH ? { flipH: !sel.flipH } : { flipV: !sel.flipV };
      updateEl(sel.id, patch);
      renderLeftPanel();
      const canvasEl = document.querySelector('.sn-builder-el[data-id="' + sel.id + '"]');
      if (canvasEl) {
        const cur = S.elements.find(e => e.id === sel.id);
        if (cur) {
          const ft = (cur.flipH ? ' scaleX(-1)' : '') + (cur.flipV ? ' scaleY(-1)' : '');
          canvasEl.style.transform = 'rotate(' + (getElOnCanvas(cur).rotation || 0) + 'deg)' + ft;
        }
      }
    };
  });

  panel.querySelectorAll('.action-btn').forEach(btn => {
    btn.onclick = () => { updateEl(sel.id, { actionType: btn.dataset.action }); renderLeftPanel(); };
  });

  const avInput = document.getElementById('prop-action-value');
  avInput.addEventListener('input', () => updateEl(sel.id, { actionValue: avInput.value }));
  avInput.onfocus = e => e.target.style.borderColor = '#444';
  avInput.onblur  = e => e.target.style.borderColor = '#1e1e30';

  const removeBtn = document.getElementById('remove-btn');
  removeBtn.onclick      = () => { removeEl(sel.id); renderLeftPanel(); renderCanvas(); };
  removeBtn.onmouseenter = () => removeBtn.style.background = '#221111';
  removeBtn.onmouseleave = () => removeBtn.style.background = 'transparent';

  // onlyShowOn buttons
  panel.querySelectorAll('.osos-btn').forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.osos === '' ? null : btn.dataset.osos;
      updateEl(sel.id, { onlyShowOn: v });
      renderLeftPanel(); renderCanvas();
    };
  });
}

// Wire mobile layout controls — called at end of renderLeftPanel
function wireMobileControls() {
  const toggleBtn = document.getElementById('mobile-toggle'); if (!toggleBtn) return;
  toggleBtn.onclick = () => {
    S.mobileEnabled = !S.mobileEnabled;
    if (!S.mobileEnabled) S.canvasMode = 'desktop';
    renderLeftPanel(); renderCanvas();
  };

  const bpInput = document.getElementById('mobile-bp');
  if (bpInput) {
    bpInput.addEventListener('input', () => { S.mobileBreakpoint = parseInt(bpInput.value, 10) || 768; });
    bpInput.onfocus = e => e.target.style.borderColor = '#444';
    bpInput.onblur  = e => e.target.style.borderColor = '#1e1e30';
  }

  document.querySelectorAll('.mar-btn').forEach(btn => {
    btn.onclick = () => { S.mobileAspectRatio = btn.dataset.ar; renderLeftPanel(); renderCanvas(); };
  });

  const mobileBgBtn = document.getElementById('mobile-bg-btn');
  if (mobileBgBtn) {
    mobileBgBtn.onclick      = () => document.getElementById('mobile-bg-input').click();
    mobileBgBtn.onmouseenter = () => { mobileBgBtn.style.borderColor = '#69F0AE'; mobileBgBtn.style.color = '#69F0AE'; };
    mobileBgBtn.onmouseleave = () => { mobileBgBtn.style.borderColor = '#1e1e30'; mobileBgBtn.style.color = '#8888aa'; };
  }
}

// ── Render: code panel ─────────────────────────────────────────────────────────
function renderCodePanel() {
  const panel = document.getElementById('code-panel'); if (!panel) return;

  const scene     = { elements: S.elements, backgrounds: S.backgrounds, aspectRatio: S.aspectRatio, exportBgColor: S.exportBgColor, imagePrefix: S.imagePrefix, mobileEnabled: S.mobileEnabled, mobileBreakpoint: S.mobileBreakpoint, mobileAspectRatio: S.mobileAspectRatio, mobileBgs: S.mobileBgs, filterMode: S.filterMode, edgeFade: S.edgeFade };
  const fenceCode = generateCodeFence(scene);
  const embedCode = generateEmbed(scene);
  const code      = S.elements.length > 0 || S.backgrounds.length > 0
    ? (S.codeTab === 'markdown' ? fenceCode : embedCode)
    : '// Add elements to generate code';

  const tabStyle = (active) => `padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;font-weight:${active?600:400};border:1px solid ${active?'#FFD700':'#1e1e30'};background:${active?'#FFD70012':'transparent'};color:${active?'#FFD700':'#8888aa'};transition:all 0.15s;`;

  const isOutput = S.codeTab === 'embed' || S.codeTab === 'markdown';

  const desc = S.codeTab === 'markdown'
    ? 'The <span style="color:#FFD700;font-family:\'Space Mono\',monospace;">```scene-nav```</span> code fence for your markdown file. Source of truth — the visualizer reads this at build time.'
    : S.codeTab === 'embed'
    ? 'Standalone HTML/CSS/JS — paste into Shopify or any website. Replace filename image sources with hosted URLs for production.'
    : 'Paste a <span style="color:#FFD700;font-family:\'Space Mono\',monospace;">```scene-nav```</span> code fence to apply its settings to images with matching filenames.';

  panel.innerHTML = `
    <div style="padding:12px 16px;border-bottom:1px solid #141422;display:flex;gap:6px;flex-wrap:wrap;">
      <button id="tab-embed"    style="${tabStyle(S.codeTab==='embed')}">Embed HTML</button>
      <button id="tab-markdown" style="${tabStyle(S.codeTab==='markdown')}">&#96;&#96;&#96; Markdown &#96;&#96;&#96;</button>
      <button id="tab-import"   style="${tabStyle(S.codeTab==='import')}">↓ Import</button>
    </div>
    <div style="padding:12px 16px;border-bottom:1px solid #0e0e1e;font-size:12px;color:#7a7a9a;line-height:1.6;">${desc}</div>

    ${isOutput ? `
    <div style="flex:1;overflow:auto;padding:16px;">
      <pre style="margin:0;font-size:11px;line-height:1.65;color:#9090b0;font-family:'Space Mono',monospace;white-space:pre-wrap;word-break:break-all;">${escHtml(code)}</pre>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #141422;">
      <button id="copy-btn" style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#FFD700,#FF6B9D);color:#000;font-weight:700;font-size:13px;cursor:pointer;">
        Copy ${S.codeTab === 'markdown' ? 'Markdown' : 'Embed Code'}
      </button>
    </div>
    ` : `
    <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;">
      <textarea id="import-textarea" placeholder="\`\`\`scene-nav&#10;aspectRatio: &quot;16/9&quot;&#10;background: scene.png&#10;elements:&#10;  - image: char.png&#10;    x: 25&#10;    y: 30&#10;    scale: 18&#10;\`\`\`" style="
        flex:1;width:100%;min-height:240px;background:#0c0c18;color:#ccc;
        border:1px solid #1e1e30;border-radius:6px;padding:10px;
        font-family:'Space Mono',monospace;font-size:11px;line-height:1.6;
        outline:none;resize:none;transition:border-color 0.15s;"></textarea>
      <div id="import-status" style="font-size:11px;color:#7a7a9a;font-family:'Space Mono',monospace;min-height:16px;"></div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #141422;">
      <button id="import-apply-btn" style="width:100%;padding:10px;border-radius:8px;border:1px solid #FFD70050;background:#FFD70012;color:#FFD700;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s;">
        Apply Settings
      </button>
    </div>
    `}
  `;

  document.getElementById('tab-embed').onclick    = () => { S.codeTab = 'embed';    renderCodePanel(); };
  document.getElementById('tab-markdown').onclick = () => { S.codeTab = 'markdown'; renderCodePanel(); };
  document.getElementById('tab-import').onclick   = () => { S.codeTab = 'import';   renderCodePanel(); };

  if (isOutput) {
    document.getElementById('copy-btn').onclick = () => {
      const text = S.codeTab === 'markdown' ? fenceCode : embedCode;
      const btn  = document.getElementById('copy-btn');
      const label = S.codeTab === 'markdown' ? 'Markdown' : 'Embed Code';
      const confirm = () => {
        btn.textContent = '✓ Copied!';
        btn.style.background = 'linear-gradient(135deg,#69F0AE,#00E5FF)';
        setTimeout(() => { btn.textContent = 'Copy ' + label; btn.style.background = 'linear-gradient(135deg,#FFD700,#FF6B9D)'; }, 1800);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(confirm).catch(() => { fallbackCopy(text); confirm(); });
      } else { fallbackCopy(text); confirm(); }
    };
  } else {
    const ta = document.getElementById('import-textarea');
    ta.onfocus = () => ta.style.borderColor = '#444';
    ta.onblur  = () => ta.style.borderColor = '#1e1e30';
    document.getElementById('import-apply-btn').onclick = () => {
      const text = ta.value.trim(); if (!text) return;
      const parsed = parseCodeFence(text);
      const { appliedEl, appliedBg } = applyImport(parsed);
      const status = document.getElementById('import-status');
      const parts = [];
      if (appliedEl) parts.push(appliedEl + ' element' + (appliedEl !== 1 ? 's' : ''));
      if (appliedBg) parts.push(appliedBg + ' background' + (appliedBg !== 1 ? 's' : ''));
      status.textContent = parts.length ? '✓ Applied to ' + parts.join(', ') + '.' : 'No matching images found — upload images first, then import.';
      status.style.color = parts.length ? '#69F0AE' : '#aa6644';
      if (parts.length) { renderLeftPanel(); renderCanvas(); }
    };
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
}

// ── Mode switch ────────────────────────────────────────────────────────────────
function updateModeBtns() {
  ['edit','preview','code'].forEach(m => {
    const btn = document.getElementById('mode-' + m); if (!btn) return;
    btn.style.background = S.mode === m ? '#1a1a2e' : 'transparent';
    btn.style.color      = S.mode === m ? '#FFD700' : '#8888aa';
    btn.style.fontWeight = S.mode === m ? 700 : 400;
  });
}

function switchMode(m) {
  S.mode = m; updateModeBtns();
  const lw = document.getElementById('left-panel-wrap');
  const ca = document.getElementById('canvas-area');
  const cp = document.getElementById('code-panel');
  if (lw) lw.style.display = m === 'edit' ? 'flex' : 'none';
  if (ca) ca.style.display = m !== 'code' ? 'flex' : 'none';
  if (cp) cp.style.display = m === 'code' ? 'flex' : 'none';
  if (m !== 'code') renderCanvas();
  if (m === 'code') renderCodePanel();
  if (m === 'edit') renderLeftPanel();
}

// ── File uploads ───────────────────────────────────────────────────────────────
document.getElementById('bg-input').addEventListener('change', (e) => {
  const files = Array.from(e.target.files); if (!files.length) return;
  let loaded = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      S.backgrounds.push({ id: nextId(), src: ev.target.result, fileName: f.name, x: 0, y: 0, scale: 100, rotation: 0, mobileOverride: null });
      if (++loaded === files.length) { renderCanvas(); renderLeftPanel(); }
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
});

document.getElementById('el-input').addEventListener('change', (e) => {
  const files = Array.from(e.target.files); let loaded = 0;
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        S.elements.push({
          id: nextId(), src: ev.target.result, fileName: f.name,
          naturalW: img.naturalWidth, naturalH: img.naturalHeight,
          x: 15 + Math.random() * 25, y: 15 + Math.random() * 25, scale: 18,
          label:        f.name.replace(/\.[^.]+$/, ''),
          glowColor:    GLOW_PRESETS[(S.elements.length + i) % GLOW_PRESETS.length].color,
          glowIntensity: 1, actionType: 'filter', actionValue: '', rotation: 0, resetRotationOnHover: true,
          flipH: false, flipV: false,
          onlyShowOn: null, mobileOverride: null,
        });
        if (++loaded === files.length) { renderLeftPanel(); renderCanvas(); }
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
});

// Mobile background upload
document.getElementById('mobile-bg-input').addEventListener('change', (e) => {
  const files = Array.from(e.target.files); if (!files.length) return;
  let loaded = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      S.mobileBgs.push({ id: nextId(), src: ev.target.result, fileName: f.name, x: 0, y: 0, scale: 100, rotation: 0 });
      if (++loaded === files.length) { renderLeftPanel(); renderCanvas(); }
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
});

// ── Keyboard shortcuts ─────────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;

  if ((e.key === 'Delete' || e.key === 'Backspace') && S.selectedId) {
    const { el, bg } = getSelected();
    if (el) { removeEl(S.selectedId); renderLeftPanel(); renderCanvas(); }
    if (bg) { removeBg(S.selectedId); renderLeftPanel(); renderCanvas(); }
  }
  if (e.key === 'Escape') { S.selectedId = null; renderLeftPanel(); renderCanvas(); }

  // Arrow key nudge for selected elements (0.5% step, 2% with Shift)
  if (S.mode === 'edit' && S.selectedId && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    const { el: keyEl } = getSelected();
    if (!keyEl) return;
    e.preventDefault();
    const step = e.shiftKey ? 2 : 0.5;
    const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
    const dy = e.key === 'ArrowUp'   ? -step : e.key === 'ArrowDown'  ? step : 0;
    const writesToOverride = S.canvasMode === 'mobile' && keyEl.onlyShowOn !== 'mobile';
    if (writesToOverride) {
      if (!keyEl.mobileOverride) keyEl.mobileOverride = {};
      const curPos = getElOnCanvas(keyEl);
      keyEl.mobileOverride.x = curPos.x + dx;
      keyEl.mobileOverride.y = curPos.y + dy;
      updateEl(keyEl.id, { mobileOverride: { ...keyEl.mobileOverride } });
    } else {
      keyEl.x += dx;
      keyEl.y += dy;
    }
    const canvasEl = document.querySelector('.sn-builder-el[data-id="' + keyEl.id + '"]');
    if (canvasEl) {
      const pos = getElOnCanvas(keyEl);
      canvasEl.style.left = pos.x + '%';
      canvasEl.style.top  = pos.y + '%';
    }
  }
});

// ── Init: DOM skeleton ─────────────────────────────────────────────────────────
function init() {
  document.getElementById('app').innerHTML = `
    <div style="padding:12px 20px;border-bottom:1px solid #141422;display:flex;align-items:center;justify-content:space-between;background:#0a0a14;flex-wrap:wrap;gap:10px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#FFD700,#FF6B9D);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;">✦</div>
        <div>
          <span style="font-weight:700;font-size:14px;letter-spacing:-0.02em;">Scene Nav</span>
          <span style="font-size:11px;color:#7a7a9a;font-family:'Space Mono',monospace;margin-left:8px;">magic machine</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;background:#0c0c16;border-radius:8px;padding:3px;border:1px solid #141422;">
        <button id="mode-edit"    style="padding:6px 16px;border-radius:6px;border:none;background:#1a1a2e;color:#FFD700;cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;font-weight:700;transition:all 0.15s;">Edit</button>
        <button id="mode-preview" style="padding:6px 16px;border-radius:6px;border:none;background:transparent;color:#8888aa;cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;font-weight:400;transition:all 0.15s;">Preview</button>
        <button id="mode-code"    style="padding:6px 16px;border-radius:6px;border:none;background:transparent;color:#8888aa;cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;font-weight:400;transition:all 0.15s;">Code</button>
      </div>
    </div>

    <div id="main" style="display:flex;flex:1;overflow:hidden;">
      <div id="left-panel-wrap" style="width:260px;border-right:1px solid #141422;background:#0a0a14;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;">
        <div id="left-panel" style="padding:14px;"></div>
      </div>

      <div id="canvas-area" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow:auto;background:#08080e;">
        <div id="scene-container" style="position:relative;width:100%;max-width:800px;aspect-ratio:16/9;min-height:280px;border-radius:10px;overflow:visible;border:1px solid #141422;background:repeating-conic-gradient(#111118 0% 25%, #0d0d14 0% 50%) 50% / 18px 18px;"></div>
      </div>

      <div id="code-panel" style="flex:1;display:none;flex-direction:column;background:#0a0a14;"></div>
    </div>
  `;

  document.getElementById('mode-edit').onclick    = () => switchMode('edit');
  document.getElementById('mode-preview').onclick = () => switchMode('preview');
  document.getElementById('mode-code').onclick    = () => switchMode('code');

  // Click canvas background → deselect
  document.getElementById('scene-container').addEventListener('click', (e) => {
    if (e.target.closest('.sn-builder-el') || e.target.closest('.sn-bg-layer')) return;
    if (S.mode === 'edit') { S.selectedId = null; renderLeftPanel(); renderCanvas(); }
  });

  renderLeftPanel();
  renderCanvas();
}

init();
</script>
</body>
</html>
