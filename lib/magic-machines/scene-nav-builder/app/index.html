<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene Nav Builder — Bloob Haus</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #08080e; color: #ddd; font-family: 'DM Sans', system-ui, sans-serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a14; }
    ::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 3px; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: #1e1e30; border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; cursor: pointer;
      background: var(--range-color, #FFD700);
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--range-color, #FFD700);
    }
    button { font-family: inherit; }

    /* Label edge repositioning for builder canvas */
    .sn-builder-el.label-above .sn-builder-label { bottom: auto !important; top: -30px !important; }
    .sn-builder-el.label-left  .sn-builder-label { left: 0 !important; transform: none !important; }
    .sn-builder-el.label-right .sn-builder-label { left: auto !important; right: 0 !important; transform: none !important; }
  </style>
</head>
<body>

<div id="app" style="height:100vh;display:flex;flex-direction:column;"></div>
<input id="bg-input"        type="file" accept="image/*" multiple style="display:none" />
<input id="mobile-bg-input" type="file" accept="image/*" multiple style="display:none" />
<input id="el-input"        type="file" accept="image/*" multiple style="display:none" />

<script>
/* =============================================================================
   BLOOB HAUS — Scene Nav Builder (Magic Machine)
   Vanilla JS, no dependencies, no build step. Open in any browser.

   Outputs:
   1. ```scene-nav``` code fence (YAML) — source of truth for Bloob Haus
   2. Standalone HTML/CSS/JS embed code — for Shopify, any website

   Architecture:
   - State: plain object S
   - DOM: init() builds the layout skeleton once; render* functions update regions
   - Drag: updates DOM directly during mousemove, commits x/y to state on mouseup
   ============================================================================= */

// ── Constants ──────────────────────────────────────────────────────────────────
const GLOW_PRESETS = [
  { name: 'Gold',   color: '#FFD700' },
  { name: 'Rose',   color: '#FF6B9D' },
  { name: 'Cyan',   color: '#00E5FF' },
  { name: 'Violet', color: '#B388FF' },
  { name: 'Mint',   color: '#69F0AE' },
  { name: 'Coral',  color: '#FF8A65' },
  { name: 'White',  color: '#FFFFFF' },
  { name: 'Blue',   color: '#448AFF' },
];

const ACTION_TYPES = [
  { value: 'filter', label: 'Filter (Shopify tag)', icon: '◉' },
  { value: 'link',   label: 'Open link (new tab)',  icon: '↗' },
  { value: 'anchor', label: 'Jump to section',      icon: '↓' },
];

const ASPECT_RATIOS = [
  { label: '16:9', value: '16/9' },
  { label: '4:3',  value: '4/3'  },
  { label: '3:2',  value: '3/2'  },
  { label: '1:1',  value: '1/1'  },
  { label: '9:16', value: '9/16' },
];

const MOBILE_ASPECT_RATIOS = [
  { label: '9:16', value: '9/16' },
  { label: '4:5',  value: '4/5'  },
  { label: '3:4',  value: '3/4'  },
  { label: '2:3',  value: '2/3'  },
  { label: '1:1',  value: '1/1'  },
];

// The HTML parser closes a <script> block on the first </scr + ipt> it finds in the source.
// SCRIPT_CLOSE is built at runtime so that sequence never appears literally here.
const SCRIPT_CLOSE = '<' + '/script>';

// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  elements:          [],
  backgrounds:       [],       // [{id, src, fileName, x, y, scale}]
  mobileBgs:         [],       // [{id, src, fileName, x, y, scale}] — mobile-only backgrounds
  aspectRatio:       '16/9',
  imagePrefix:       '',
  editBgColor:       '#0d0d1a',
  previewBgColor:    '#000000',
  exportBgColor:     'transparent',
  selectedId:        null,
  mode:              'edit',   // 'edit' | 'preview' | 'code'
  codeTab:           'embed',  // 'embed' | 'markdown' | 'import'
  // Mobile layout
  mobileEnabled:     false,
  mobileBreakpoint:  768,
  mobileAspectRatio: '9/16',
  canvasMode:        'desktop', // 'desktop' | 'mobile'
  filterMode:        'or',      // 'or' (any selected) | 'and' (all selected)
  edgeFade:          0,         // 0 = off, 0–0.5 controls fade start from edge
  previewActiveFilters: [],     // tags active in preview mode
};
let _idN = 0;
const nextId = () => 'el_' + Date.now() + '_' + (_idN++);

// ── Helpers ────────────────────────────────────────────────────────────────────
const esc     = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escHtml = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Resolve selectedId to the actual object (checks elements, then desktop bgs, then mobile bgs)
function getSelected() {
  if (!S.selectedId) return { el: null, bg: null };
  const el = S.elements.find(e => e.id === S.selectedId) || null;
  const bg = el ? null : (
    S.backgrounds.find(b => b.id === S.selectedId) ||
    S.mobileBgs.find(b => b.id === S.selectedId) ||
    null
  );
  return { el, bg };
}

// True if the bg object belongs to S.mobileBgs (vs desktop S.backgrounds)
function isMobileBg(bg) {
  return S.mobileBgs.some(b => b.id === bg.id);
}

// Effective bg position for the current canvas mode.
// Desktop bgs in mobile mode: merges mobileOverride. Mobile bgs: read directly.
function getBgOnCanvas(bg) {
  if (S.canvasMode === 'mobile' && !isMobileBg(bg)) {
    const mo = bg.mobileOverride || {};
    return {
      x:        mo.x        !== undefined ? mo.x        : bg.x,
      y:        mo.y        !== undefined ? mo.y        : bg.y,
      scale:    mo.scale    !== undefined ? mo.scale    : bg.scale,
      rotation: mo.rotation !== undefined ? mo.rotation : (bg.rotation || 0),
    };
  }
  return { x: bg.x, y: bg.y, scale: bg.scale, rotation: bg.rotation || 0 };
}

// ── Canvas mode helpers ─────────────────────────────────────────────────────────
// Returns effective position/scale for the current canvas mode
function getElOnCanvas(el) {
  if (S.canvasMode === 'mobile') {
    const mo = el.mobileOverride || {};
    return {
      x:        mo.x        !== undefined ? mo.x        : el.x,
      y:        mo.y        !== undefined ? mo.y        : el.y,
      scale:    mo.scale    !== undefined ? mo.scale    : el.scale,
      rotation: mo.rotation !== undefined ? mo.rotation : (el.rotation || 0),
    };
  }
  return { x: el.x, y: el.y, scale: el.scale, rotation: el.rotation || 0 };
}

// Whether an element should appear on the current canvas
function visibleOnCanvas(el) {
  if (S.canvasMode === 'mobile') return !el.onlyShowOn || el.onlyShowOn === 'mobile';
  return !el.onlyShowOn || el.onlyShowOn === 'desktop';
}

// ── Code generators ────────────────────────────────────────────────────────────
// Returns filename wrapped in Obsidian image syntax if a prefix is set, else bare filename
function imgRef(fileName, pfx) {
  return pfx ? '![](' + pfx + fileName + ')' : fileName;
}

function generateCodeFence(scene) {
  const pfx  = scene.imagePrefix || '';
  let yaml = 'aspectRatio: "' + scene.aspectRatio + '"\n';
  if (scene.filterMode && scene.filterMode !== 'or') yaml += 'filterMode: ' + scene.filterMode + '\n';
  if (scene.edgeFade) yaml += 'edgeFade: ' + scene.edgeFade + '\n';

  const bgHasMobileOverride = scene.backgrounds.some(bg => bg.mobileOverride && Object.keys(bg.mobileOverride).length > 0);
  const bgSimple = scene.backgrounds.length === 1 && scene.backgrounds[0].x === 0 && scene.backgrounds[0].y === 0 && scene.backgrounds[0].scale === 100 && !scene.backgrounds[0].rotation && !bgHasMobileOverride;
  if (bgSimple) {
    yaml += 'background: ' + imgRef(scene.backgrounds[0].fileName, pfx) + '\n';
  } else if (scene.backgrounds.length > 0) {
    yaml += 'backgrounds:\n';
    scene.backgrounds.forEach(bg => {
      yaml += '  - image: ' + imgRef(bg.fileName, pfx) + '\n';
      if (bg.x !== 0)        yaml += '    x: '        + (Math.round(bg.x        * 10) / 10) + '\n';
      if (bg.y !== 0)        yaml += '    y: '        + (Math.round(bg.y        * 10) / 10) + '\n';
      if (bg.scale !== 100)  yaml += '    scale: '    + (Math.round(bg.scale    * 10) / 10) + '\n';
      if (bg.rotation)       yaml += '    rotation: ' + bg.rotation + '\n';
      if (scene.mobileEnabled && bg.mobileOverride && Object.keys(bg.mobileOverride).length > 0) {
        yaml += '    mobile:\n';
        const mo = bg.mobileOverride;
        if (mo.x        !== undefined) yaml += '      x: '        + (Math.round(mo.x        * 10) / 10) + '\n';
        if (mo.y        !== undefined) yaml += '      y: '        + (Math.round(mo.y        * 10) / 10) + '\n';
        if (mo.scale    !== undefined) yaml += '      scale: '    + (Math.round(mo.scale    * 10) / 10) + '\n';
        if (mo.rotation !== undefined) yaml += '      rotation: ' + mo.rotation + '\n';
      }
    });
  }

  // Mobile top-level block
  if (scene.mobileEnabled) {
    yaml += 'mobile:\n';
    yaml += '  breakpoint: ' + scene.mobileBreakpoint + '\n';
    yaml += '  aspectRatio: "' + scene.mobileAspectRatio + '"\n';
    if (scene.mobileBgs.length === 1 && scene.mobileBgs[0].x === 0 && scene.mobileBgs[0].y === 0 && scene.mobileBgs[0].scale === 100) {
      yaml += '  background: ' + imgRef(scene.mobileBgs[0].fileName, pfx) + '\n';
    } else if (scene.mobileBgs.length > 1) {
      yaml += '  backgrounds:\n';
      scene.mobileBgs.forEach(bg => {
        yaml += '    - image: ' + imgRef(bg.fileName, pfx) + '\n';
        if (bg.x !== 0)       yaml += '      x: '     + (Math.round(bg.x     * 10) / 10) + '\n';
        if (bg.y !== 0)       yaml += '      y: '     + (Math.round(bg.y     * 10) / 10) + '\n';
        if (bg.scale !== 100) yaml += '      scale: ' + (Math.round(bg.scale * 10) / 10) + '\n';
      });
    }
  }

  if (scene.elements.length === 0) return '```scene-nav\n' + yaml + '```';

  yaml += 'elements:\n';
  scene.elements.forEach(el => {
    yaml += '  - image: ' + imgRef(el.fileName, pfx) + '\n';
    yaml += '    x: '     + (Math.round(el.x     * 10) / 10) + '\n';
    yaml += '    y: '     + (Math.round(el.y     * 10) / 10) + '\n';
    yaml += '    scale: ' + (Math.round(el.scale * 10) / 10) + '\n';
    if (el.rotation)                       yaml += '    rotation: ' + el.rotation + '\n';
    if (el.flipH)                          yaml += '    flipH: true\n';
    if (el.flipV)                          yaml += '    flipV: true\n';
    if (el.resetRotationOnHover === false) yaml += '    resetRotationOnHover: false\n';
    if (el.label)               yaml += '    label: "' + el.label + '"\n';
    yaml += '    glow: "' + el.glowColor + '"\n';
    if (el.glowIntensity !== 1) yaml += '    glowIntensity: ' + el.glowIntensity + '\n';
    yaml += '    action: ' + el.actionType + '\n';
    if (el.actionValue)         yaml += '    value: "' + el.actionValue + '"\n';
    if (el.onlyShowOn)          yaml += '    onlyShowOn: ' + el.onlyShowOn + '\n';
    // Per-element mobile override block
    if (scene.mobileEnabled && el.mobileOverride && Object.keys(el.mobileOverride).length > 0) {
      yaml += '    mobile:\n';
      const mo = el.mobileOverride;
      if (mo.x        !== undefined) yaml += '      x: '        + (Math.round(mo.x        * 10) / 10) + '\n';
      if (mo.y        !== undefined) yaml += '      y: '        + (Math.round(mo.y        * 10) / 10) + '\n';
      if (mo.scale    !== undefined) yaml += '      scale: '    + (Math.round(mo.scale    * 10) / 10) + '\n';
      if (mo.rotation !== undefined) yaml += '      rotation: ' + mo.rotation + '\n';
      if (mo.fileName)               yaml += '      image: '   + imgRef(mo.fileName, pfx) + '\n';
      if (mo.actionType)             yaml += '      action: '  + mo.actionType + '\n';
      if (mo.actionValue !== undefined) yaml += '      value: "' + mo.actionValue + '"\n';
    }
  });
  return '```scene-nav\n' + yaml + '```';
}

function buildEmbedElement(el, pfx) {
  return {
    src:                 pfx + (el.fileName || ''),
    x:                   Math.round(el.x     * 10) / 10,
    y:                   Math.round(el.y     * 10) / 10,
    scale:               Math.round(el.scale * 10) / 10,
    rotation:            el.rotation    || 0,
    resetRotationOnHover: el.resetRotationOnHover !== false,
    label:               el.label       || null,
    glow:                el.glowColor,
    glowIntensity:       el.glowIntensity,
    action:              el.actionType,
    value:               el.actionValue || null,
    flipH:               el.flipH || false,
    flipV:               el.flipV || false,
  };
}

// Shared IIFE body — renders backgrounds + elements into a container by id
const EMBED_RENDER_FN = [
  'var activeFilters = [];',
  'function applyFilter() {',
  '  var mode = C.filterMode || \'or\';',
  '  var items = document.querySelectorAll(\'[data-tags]\');',
  '  items.forEach(function(item) {',
  '    if (activeFilters.length === 0) { item.style.display = \'\'; return; }',
  '    var tags = item.getAttribute(\'data-tags\').split(\',\').map(function(t){ return t.trim(); });',
  '    var match = mode === \'and\'',
  '      ? activeFilters.every(function(f){ return tags.indexOf(f) > -1; })',
  '      : activeFilters.some(function(f){ return tags.indexOf(f) > -1; });',
  '    item.style.display = match ? \'\' : \'none\';',
  '  });',
  '}',
  'function renderScene(cId, bgs, els) {',
  '  var c = document.getElementById(cId); if (!c) return;',
  '  bgs.forEach(function(bg) {',
  '    var d = document.createElement(\'div\');',
  '    d.style.cssText = \'position:absolute;pointer-events:none;left:\'+(bg.x||0)+\'%;top:\'+(bg.y||0)+\'%;width:\'+(bg.scale||100)+\'%\';',
  '    var img = document.createElement(\'img\');',
  '    img.src = bg.src; img.draggable = false; img.style.cssText = \'width:100%;height:auto;display:block\';',
  '    d.appendChild(img); c.appendChild(d);',
  '  });',
  '  els.forEach(function(el) {',
  '    var d = document.createElement(\'div\');',
  '    var gI = el.glowIntensity || 1;',
  '    var g1 = Math.round(8*gI), g2 = Math.round(20*gI), g3 = Math.round(40*gI);',
  '    var flipT = (el.flipH?\' scaleX(-1)\':\'\')+(el.flipV?\' scaleY(-1)\':\'\');',
  '    var baseRot = \'rotate(\'+(el.rotation||0)+\'deg)\'+flipT;',
  '    var glowCss = \'drop-shadow(0 0 \'+g1+\'px \'+el.glow+\') drop-shadow(0 0 \'+g2+\'px \'+el.glow+\') drop-shadow(0 0 \'+g3+\'px \'+el.glow+\'80)\';',
  '    d.style.cssText = \'position:absolute;cursor:pointer;transition:filter 0.35s ease,transform 0.25s ease;left:\'+el.x+\'%;top:\'+el.y+\'%;width:\'+el.scale+\'%;transform:\'+baseRot;',
  '    d.onmouseenter = function() {',
  '      d.style.filter = glowCss;',
  '      d.style.transform = (el.resetRotationOnHover !== false ? \'\' : \'rotate(\'+(el.rotation||0)+\'deg) \') + \'scale(1.06)\'+flipT;',
  '    };',
  '    d.onmouseleave = function() {',
  '      d.style.filter = (el.action===\'filter\' && activeFilters.indexOf(el.value) > -1) ? glowCss : \'none\';',
  '      d.style.transform = baseRot;',
  '    };',
  '    d.onclick = function() {',
  '      if (el.action===\'link\'   && el.value) { window.open(el.value,\'_blank\'); return; }',
  '      if (el.action===\'anchor\' && el.value) {',
  '        var t = document.getElementById(el.value)||document.querySelector(\'[name="\'+el.value+\'"]\');',
  '        if (t) t.scrollIntoView({behavior:\'smooth\'}); return;',
  '      }',
  '      if (el.action===\'filter\' && el.value) {',
  '        var idx = activeFilters.indexOf(el.value);',
  '        if (idx > -1) {',
  '          activeFilters.splice(idx, 1);',
  '          d.style.filter = \'none\';',
  '          d.style.transform = baseRot;',
  '        } else {',
  '          activeFilters.push(el.value);',
  '          d.style.filter = glowCss;',
  '        }',
  '        applyFilter();',
  '        window.dispatchEvent(new CustomEvent(\'bloob:filter\',{detail:{tags:activeFilters.slice(),mode:C.filterMode||\'or\'}}));',
  '      }',
  '    };',
  '    var img = document.createElement(\'img\');',
  '    img.src=el.src; img.alt=el.label||\'\'; img.draggable=false;',
  '    img.style.cssText=\'width:100%;height:auto;display:block;pointer-events:none;user-select:none\';',
  '    d.appendChild(img);',
  '    if (el.label) {',
  '      var lbl=document.createElement(\'span\');',
  '      lbl.style.cssText=\'position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:3px 11px;border-radius:12px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity 0.25s;pointer-events:none;letter-spacing:0.02em;font-family:system-ui,sans-serif\';',
  '      lbl.textContent=el.label; d.appendChild(lbl);',
  '      d.onmouseenter=(function(fn,l){return function(){fn.call(this);l.style.opacity=1};})(d.onmouseenter,lbl);',
  '      d.onmouseleave=(function(fn,l){return function(){fn.call(this);l.style.opacity=0};})(d.onmouseleave,lbl);',
  '    }',
  '    c.appendChild(d);',
  '  });',
  '}',
].join('\n');

function generateEmbed(scene) {
  const pfx  = scene.imagePrefix || '';
  const bgColor = scene.exportBgColor && scene.exportBgColor !== 'transparent' ? 'background:' + scene.exportBgColor + ';' : '';
  const fade = scene.edgeFade || 0;
  let fadeSvg = '';
  let fadeCss = '';
  if (fade > 0) {
    const inset = +(fade * 0.5).toFixed(5);
    const blur  = +(fade * 0.15).toFixed(5);
    const rw    = +(1 - 2 * inset).toFixed(5);
    fadeSvg = '<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">'
      + '<defs>'
      + '<filter id="bloob-snav-filt" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="' + blur + '"/></filter>'
      + '<mask id="bloob-snav-mask" maskContentUnits="objectBoundingBox">'
      + '<rect x="' + inset + '" y="' + inset + '" width="' + rw + '" height="' + rw + '" fill="white" filter="url(#bloob-snav-filt)"/>'
      + '</mask></defs></svg>';
    fadeCss = 'mask:url(#bloob-snav-mask);-webkit-mask:url(#bloob-snav-mask);';
  }
  const sceneStyle = 'position:relative;max-width:900px;margin:0 auto;overflow:visible;' + fadeCss;

  if (!scene.mobileEnabled) {
    // ── Single-layout embed (original behaviour) ──────────────────────────────
    const config = {
      backgrounds:  scene.backgrounds.map(bg => ({ src: pfx + bg.fileName, x: Math.round(bg.x*10)/10, y: Math.round(bg.y*10)/10, scale: Math.round(bg.scale*10)/10 })),
      elements:     scene.elements.map(el => buildEmbedElement(el, pfx)),
      filterMode:   scene.filterMode || 'or',
    };
    return [
      '<!-- Scene Nav — generated by Bloob Haus builder -->',
      '<!-- Replace image src values with hosted URLs before deploying -->',
      fadeSvg,
      '<div id="bloob-scene-nav" style="' + sceneStyle + 'aspect-ratio:' + scene.aspectRatio + ';' + bgColor + '">',
      '<script>',
      '(function(){',
      EMBED_RENDER_FN,
      '  var C = ' + JSON.stringify(config, null, 2) + ';',
      '  renderScene(\'bloob-scene-nav\', C.backgrounds, C.elements);',
      '})();',
      SCRIPT_CLOSE,
      '</div>',
    ].join('\n');
  }

  // ── Two-layout embed (mobile enabled) ────────────────────────────────────────
  const bp = scene.mobileBreakpoint;

  const desktopEls = scene.elements
    .filter(el => !el.onlyShowOn || el.onlyShowOn === 'desktop')
    .map(el => buildEmbedElement(el, pfx));

  const mobileEls = scene.elements
    .filter(el => !el.onlyShowOn || el.onlyShowOn === 'mobile')
    .map(el => {
      const base = buildEmbedElement(el, pfx);
      const mo   = el.mobileOverride || {};
      return {
        ...base,
        src:                 pfx + (mo.fileName || el.fileName || ''),
        x:                   mo.x        !== undefined ? Math.round(mo.x        * 10) / 10 : base.x,
        y:                   mo.y        !== undefined ? Math.round(mo.y        * 10) / 10 : base.y,
        scale:               mo.scale    !== undefined ? Math.round(mo.scale    * 10) / 10 : base.scale,
        rotation:            mo.rotation !== undefined ? mo.rotation : base.rotation,
        action:              mo.actionType  || base.action,
        value:               mo.actionValue !== undefined ? mo.actionValue : base.value,
      };
    });

  const mobileBgSrcs = (scene.mobileBgs.length > 0 ? scene.mobileBgs : scene.backgrounds)
    .map(bg => ({ src: pfx + bg.fileName, x: Math.round(bg.x*10)/10, y: Math.round(bg.y*10)/10, scale: Math.round(bg.scale*10)/10 }));

  const config = {
    desktopBgs:  scene.backgrounds.map(bg => ({ src: pfx + bg.fileName, x: Math.round(bg.x*10)/10, y: Math.round(bg.y*10)/10, scale: Math.round(bg.scale*10)/10 })),
    desktopEls,
    mobileBgs:   mobileBgSrcs,
    mobileEls,
    filterMode:  scene.filterMode || 'or',
  };

  return [
    '<!-- Scene Nav — generated by Bloob Haus builder -->',
    '<!-- Replace image src values with hosted URLs before deploying -->',
    fadeSvg,
    '<style>',
    '  @media (max-width:' + bp + 'px){#sn-desktop{display:none}}',
    '  @media (min-width:' + (bp+1) + 'px){#sn-mobile{display:none}}',
    '</style>',
    '<div id="sn-desktop" style="' + sceneStyle + 'aspect-ratio:' + scene.aspectRatio + ';' + bgColor + '"></div>',
    '<div id="sn-mobile"  style="' + sceneStyle + 'aspect-ratio:' + scene.mobileAspectRatio + ';' + bgColor + '"></div>',
    '<script>',
    '(function(){',
    EMBED_RENDER_FN,
    '  var C = ' + JSON.stringify(config, null, 2) + ';',
    '  renderScene(\'sn-desktop\', C.desktopBgs, C.desktopEls);',
    '  renderScene(\'sn-mobile\',  C.mobileBgs,  C.mobileEls);',
    '})();',
    SCRIPT_CLOSE,
  ].join('\n');
}

// ── Import: parse code fence + apply to loaded images ─────────────────────────
// ⚠️  SYNC NOTE: This parser duplicates the logic in
//     lib/visualizers/scene-nav/parser.js (Node.js, build-time).
//     When adding new fields to the scene-nav schema, update BOTH files.
//     Canonical field reference: lib/visualizers/scene-nav/schema.md
function parseCodeFence(text) {
  const match = text.match(/```scene-nav\n([\s\S]*?)```/);
  const yaml  = match ? match[1] : text;
  const result = { aspectRatio: null, backgrounds: [], elements: [], mobile: null, filterMode: null, edgeFade: null };
  let section = null, item = null, mobileItem = null, inMobileBlock = false, inElementMobileBlock = false, inBgMobileBlock = false;

  const stripImg = (v) => { const m = v.match(/!\[\]\((.+)\)/); return m ? m[1] : v; };

  const pushItem = () => {
    if (!item) return;
    if (section === 'backgrounds') result.backgrounds.push(item);
    else if (section === 'elements') result.elements.push(item);
    item = null; mobileItem = null; inElementMobileBlock = false; inBgMobileBlock = false;
  };

  for (const rawLine of yaml.split('\n')) {
    const trimmed = rawLine.trim(); if (!trimmed) continue;
    const indent = rawLine.match(/^(\s*)/)[1].length;

    if (indent === 0) {
      pushItem(); inMobileBlock = false; inBgMobileBlock = false;
      if (trimmed.startsWith('aspectRatio:')) {
        result.aspectRatio = trimmed.split(':').slice(1).join(':').trim().replace(/^"|"$/g, '');
      } else if (trimmed.startsWith('filterMode:')) {
        result.filterMode = trimmed.split(':')[1].trim();
      } else if (trimmed.startsWith('edgeFade:')) {
        result.edgeFade = parseFloat(trimmed.split(':')[1].trim()) || 0;
      } else if (trimmed.startsWith('background:')) {
        result.backgrounds = [{ fileName: stripImg(trimmed.split(':').slice(1).join(':').trim()), x: 0, y: 0, scale: 100 }];
      } else if (trimmed === 'backgrounds:') { section = 'backgrounds'; }
      else if (trimmed === 'elements:')      { section = 'elements'; }
      else if (trimmed === 'mobile:')        { inMobileBlock = true; result.mobile = {}; section = null; }
    } else if (inMobileBlock && indent === 2) {
      // Top-level mobile block fields
      if (trimmed.startsWith('background:')) {
        result.mobile.backgrounds = [{ fileName: stripImg(trimmed.split(':').slice(1).join(':').trim()), x: 0, y: 0, scale: 100 }];
      } else if (trimmed === 'backgrounds:') { result.mobile._bgSection = true; }
      else if (trimmed.includes(':')) {
        const ci = trimmed.indexOf(':');
        const k  = trimmed.slice(0, ci).trim();
        const v  = trimmed.slice(ci + 1).trim().replace(/^"|"$/g, '');
        if (k === 'breakpoint')  result.mobile.breakpoint  = parseFloat(v) || 768;
        if (k === 'aspectRatio') result.mobile.aspectRatio = v;
      }
    } else if (section === 'backgrounds' || section === 'elements') {
      if (trimmed.startsWith('- ')) {
        pushItem(); item = {};
        if (trimmed.startsWith('- image:')) item.fileName = stripImg(trimmed.replace(/^-\s*image:\s*/, ''));
      } else if (item) {
        // Per-bg mobile: block (indent 4 in backgrounds section)
        if (trimmed === 'mobile:' && section === 'backgrounds' && indent === 4) {
          inBgMobileBlock = true; item.mobileOverride = {};
        } else if (inBgMobileBlock && section === 'backgrounds' && indent >= 6) {
          const ci = trimmed.indexOf(':');
          if (ci > -1) {
            const k = trimmed.slice(0, ci).trim();
            const v = trimmed.slice(ci + 1).trim().replace(/^"|"$/g, '');
            if (k === 'x')        item.mobileOverride.x        = parseFloat(v) || 0;
            if (k === 'y')        item.mobileOverride.y        = parseFloat(v) || 0;
            if (k === 'scale')    item.mobileOverride.scale    = parseFloat(v) || 100;
            if (k === 'rotation') item.mobileOverride.rotation = parseFloat(v) || 0;
          }
        // Per-element mobile: block (indent 4 in elements section)
        } else if (trimmed === 'mobile:' && section === 'elements' && indent === 4) {
          inElementMobileBlock = true; item.mobileOverride = {};
        } else if (inElementMobileBlock && indent >= 6) {
          const ci = trimmed.indexOf(':');
          if (ci > -1) {
            const k = trimmed.slice(0, ci).trim();
            const v = trimmed.slice(ci + 1).trim().replace(/^"|"$/g, '');
            if (k === 'image')    item.mobileOverride.fileName    = stripImg(v);
            if (k === 'x')        item.mobileOverride.x           = parseFloat(v) || 0;
            if (k === 'y')        item.mobileOverride.y           = parseFloat(v) || 0;
            if (k === 'scale')    item.mobileOverride.scale       = parseFloat(v) || 18;
            if (k === 'rotation') item.mobileOverride.rotation    = parseFloat(v) || 0;
            if (k === 'action')   item.mobileOverride.actionType  = v;
            if (k === 'value')    item.mobileOverride.actionValue = v;
          }
        } else if (!inElementMobileBlock && !inBgMobileBlock && trimmed.includes(':')) {
          inElementMobileBlock = false; inBgMobileBlock = false;
          const ci = trimmed.indexOf(':');
          const k  = trimmed.slice(0, ci).trim();
          const v  = trimmed.slice(ci + 1).trim().replace(/^"|"$/g, '');
          if (k === 'image') item.fileName = stripImg(v);
          else if (k === 'flipH') item.flipH = v === 'true';
          else if (k === 'flipV') item.flipV = v === 'true';
          else item[k] = v;
        }
      }
    }
  }
  pushItem();
  return result;
}

function applyImport(parsed) {
  let appliedEl = 0, appliedBg = 0;
  const basename = (p) => (p || '').split('/').pop();
  if (parsed.aspectRatio)    S.aspectRatio = parsed.aspectRatio;
  if (parsed.filterMode)     S.filterMode  = parsed.filterMode;
  if (parsed.edgeFade != null) S.edgeFade  = parsed.edgeFade;

  // Mobile top-level block
  if (parsed.mobile) {
    S.mobileEnabled = true;
    if (parsed.mobile.breakpoint)  S.mobileBreakpoint  = parsed.mobile.breakpoint;
    if (parsed.mobile.aspectRatio) S.mobileAspectRatio = parsed.mobile.aspectRatio;
  }

  // Auto-detect prefix from the first image path that contains a directory
  const allPaths = [...parsed.backgrounds, ...parsed.elements].map(i => i.fileName).filter(Boolean);
  const withDir  = allPaths.find(p => p.includes('/'));
  if (withDir) S.imagePrefix = withDir.substring(0, withDir.lastIndexOf('/') + 1);

  parsed.backgrounds.forEach(imp => {
    const bg = S.backgrounds.find(b => basename(b.fileName) === basename(imp.fileName)); if (!bg) return;
    if (imp.x            !== undefined) bg.x            = parseFloat(imp.x)        || 0;
    if (imp.y            !== undefined) bg.y            = parseFloat(imp.y)        || 0;
    if (imp.scale        !== undefined) bg.scale        = parseFloat(imp.scale)    || 100;
    if (imp.rotation     !== undefined) bg.rotation     = parseFloat(imp.rotation) || 0;
    if (imp.mobileOverride)             bg.mobileOverride = imp.mobileOverride;
    appliedBg++;
  });
  parsed.elements.forEach(imp => {
    const el = S.elements.find(e => basename(e.fileName) === basename(imp.fileName)); if (!el) return;
    if (imp.x             !== undefined) el.x             = parseFloat(imp.x)             || 0;
    if (imp.y             !== undefined) el.y             = parseFloat(imp.y)             || 0;
    if (imp.scale         !== undefined) el.scale         = parseFloat(imp.scale)         || 18;
    if (imp.rotation      !== undefined) el.rotation      = parseFloat(imp.rotation)      || 0;
    if (imp.label         !== undefined) el.label         = imp.label;
    if (imp.glow          !== undefined) el.glowColor     = imp.glow;
    if (imp.glowIntensity !== undefined) el.glowIntensity = parseFloat(imp.glowIntensity) || 1;
    if (imp.action               !== undefined) el.actionType           = imp.action;
    if (imp.value                !== undefined) el.actionValue          = imp.value;
    if (imp.resetRotationOnHover !== undefined) el.resetRotationOnHover = imp.resetRotationOnHover !== 'false' && imp.resetRotationOnHover !== false;
    if (imp.flipH                !== undefined) el.flipH                = imp.flipH === true || imp.flipH === 'true';
    if (imp.flipV                !== undefined) el.flipV                = imp.flipV === true || imp.flipV === 'true';
    if (imp.onlyShowOn           !== undefined) el.onlyShowOn           = imp.onlyShowOn || null;
    if (imp.mobileOverride)                     el.mobileOverride       = imp.mobileOverride;
    appliedEl++;
  });
  return { appliedEl, appliedBg };
}

// ── State helpers ──────────────────────────────────────────────────────────────
function updateEl(id, patch) {
  const el = S.elements.find(e => e.id === id);
  if (el) Object.assign(el, patch);
}
function removeEl(id) {
  S.elements = S.elements.filter(e => e.id !== id);
  if (S.selectedId === id) S.selectedId = null;
}
function updateBg(id, patch, toOverride) {
  const bg = S.backgrounds.find(b => b.id === id) || S.mobileBgs.find(b => b.id === id);
  if (!bg) return;
  if (toOverride) {
    if (!bg.mobileOverride) bg.mobileOverride = {};
    Object.assign(bg.mobileOverride, patch);
  } else {
    Object.assign(bg, patch);
  }
}
function removeBg(id) {
  S.backgrounds = S.backgrounds.filter(b => b.id !== id);
  if (S.selectedId === id) S.selectedId = null;
}

// ── Canvas: mount draggable background layers ──────────────────────────────────
function mountBackgroundLayers(container) {
  // Ensure bg-clip wrapper exists (clips backgrounds to artboard, separate from element overflow)
  let bgClip = container.querySelector('.sn-bg-clip');
  if (!bgClip) {
    bgClip = document.createElement('div');
    bgClip.className = 'sn-bg-clip';
    Object.assign(bgClip.style, {
      position: 'absolute', inset: '0', overflow: 'hidden',
      borderRadius: '10px', zIndex: '1',
    });
    container.insertBefore(bgClip, container.firstChild);
  }
  bgClip.querySelectorAll('.sn-bg-layer').forEach(n => n.remove());

  // In mobile canvas mode use mobileBgs, falling back to desktop bgs if none uploaded
  const bgsToShow = (S.canvasMode === 'mobile' && S.mobileBgs.length > 0) ? S.mobileBgs : S.backgrounds;

  bgsToShow.forEach(bg => {
    const div = document.createElement('div');
    div.className  = 'sn-bg-layer';
    div.dataset.bgid = bg.id;

    const isSelected = S.selectedId === bg.id;
    const pos = getBgOnCanvas(bg);
    Object.assign(div.style, {
      position:        'absolute',
      left:            pos.x + '%',
      top:             pos.y + '%',
      width:           pos.scale + '%',
      transform:       pos.rotation ? `rotate(${pos.rotation}deg)` : '',
      transformOrigin: 'center',
      zIndex:          2,
      cursor:          S.mode === 'preview' ? 'default' : 'grab',
      outline:         isSelected ? '2px dashed #8888aa' : 'none',
      outlineOffset:   '3px',
      transition:      'outline 0.12s',
    });

    const img = document.createElement('img');
    img.src = bg.src; img.draggable = false;
    Object.assign(img.style, { width:'100%', height:'auto', display:'block', pointerEvents:'none', userSelect:'none' });
    div.appendChild(img);

    if (S.mode !== 'preview') {
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        S.selectedId = bg.id;
        renderLeftPanel();
        container.querySelectorAll('.sn-bg-layer').forEach(d => {
          d.style.outline = d.dataset.bgid === bg.id ? '2px dashed #8888aa' : 'none';
        });
        container.querySelectorAll('.sn-builder-el').forEach(d => { d.style.outline = 'none'; });
      });

      div.addEventListener('mousedown', (e) => {
        e.preventDefault(); e.stopPropagation();
        const rect    = container.getBoundingClientRect();
        const startMx = e.clientX, startMy = e.clientY;
        const curPos  = getBgOnCanvas(bg);
        const startBx = curPos.x, startBy = curPos.y;
        // In mobile mode, desktop bgs write to mobileOverride; mobile bgs write directly
        const writesToOverride = S.canvasMode === 'mobile' && !isMobileBg(bg);
        div.style.cursor = 'grabbing'; div.style.transition = 'none';

        const onMove = (ev) => {
          const newX = startBx + ((ev.clientX - startMx) / rect.width)  * 100;
          const newY = startBy + ((ev.clientY - startMy) / rect.height) * 100;
          if (writesToOverride) {
            if (!bg.mobileOverride) bg.mobileOverride = {};
            bg.mobileOverride.x = newX; bg.mobileOverride.y = newY;
          } else {
            bg.x = newX; bg.y = newY;
          }
          div.style.left = newX + '%'; div.style.top = newY + '%';
          if (S.selectedId === bg.id) {
            const xi = document.getElementById('bg-x');
            if (xi) { xi.value = newX; document.getElementById('bg-x-display').textContent = Math.round(newX) + '%'; }
            const yi = document.getElementById('bg-y');
            if (yi) { yi.value = newY; document.getElementById('bg-y-display').textContent = Math.round(newY) + '%'; }
          }
        };
        const onUp = () => {
          div.style.cursor = 'grab'; div.style.transition = 'outline 0.12s';
          if (writesToOverride) {
            updateBg(bg.id, { x: bg.mobileOverride.x, y: bg.mobileOverride.y }, true);
          } else {
            updateBg(bg.id, { x: bg.x, y: bg.y });
          }
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      });
    }

    bgClip.appendChild(div);
  });
}

// ── Canvas: mount draggable scene elements ─────────────────────────────────────
function mountSceneElements(container) {
  container.querySelectorAll('.sn-builder-el').forEach(n => n.remove());

  S.elements.filter(visibleOnCanvas).forEach(el => {
    const div = document.createElement('div');
    const isSelected = S.selectedId === el.id;
    const isPreview  = S.mode === 'preview';
    const pos        = getElOnCanvas(el);

    // Label edge classes
    const edgeClasses = [];
    if (el.label) {
      if (pos.y + pos.scale > 80) edgeClasses.push('label-above');
      if (pos.x < 10)             edgeClasses.push('label-left');
      if (pos.x + pos.scale > 82) edgeClasses.push('label-right');
    }
    div.className  = ['sn-builder-el', ...edgeClasses].join(' ');
    div.dataset.id = el.id;

    const flipT = (el.flipH ? ' scaleX(-1)' : '') + (el.flipV ? ' scaleY(-1)' : '');
    Object.assign(div.style, {
      position:      'absolute',
      left:          pos.x + '%',
      top:           pos.y + '%',
      width:         pos.scale + '%',
      cursor:        isPreview ? 'pointer' : 'grab',
      transition:    'filter 0.35s ease, transform 0.25s ease',
      transform:     'rotate(' + (pos.rotation || 0) + 'deg)' + flipT,
      zIndex:        isSelected ? 50 : 10,
      outline:       (!isPreview && isSelected) ? '2px dashed ' + el.glowColor : 'none',
      outlineOffset: '4px',
    });

    const img = document.createElement('img');
    img.src = el.src; img.alt = el.label || ''; img.draggable = false;
    Object.assign(img.style, { width:'100%', height:'auto', display:'block', pointerEvents:'none', userSelect:'none' });
    div.appendChild(img);

    if (el.label) {
      const lbl = document.createElement('div');
      lbl.className = 'sn-builder-label'; lbl.textContent = el.label;
      Object.assign(lbl.style, {
        position:'absolute', bottom:'-28px', left:'50%', transform:'translateX(-50%)',
        background:'rgba(0,0,0,0.82)', color:'#fff', padding:'4px 12px', borderRadius:'14px',
        fontSize:'12px', whiteSpace:'nowrap', pointerEvents:'none',
        fontFamily:"'DM Sans', sans-serif", opacity:0, transition:'opacity 0.2s',
      });
      div.appendChild(lbl);
    }

    // Hover: edit always keeps rotation; preview respects resetRotationOnHover
    div.addEventListener('mouseenter', () => {
      const cur = S.elements.find(e => e.id === el.id); if (!cur) return;
      const gI = cur.glowIntensity || 1;
      const g1 = Math.round(8*gI), g2 = Math.round(20*gI), g3 = Math.round(40*gI);
      const curFlipT = (cur.flipH ? ' scaleX(-1)' : '') + (cur.flipV ? ' scaleY(-1)' : '');
      div.style.filter    = `drop-shadow(0 0 ${g1}px ${cur.glowColor}) drop-shadow(0 0 ${g2}px ${cur.glowColor}) drop-shadow(0 0 ${g3}px ${cur.glowColor}80)`;
      const keepRot = !isPreview || cur.resetRotationOnHover === false;
      div.style.transform = (keepRot ? 'rotate(' + (getElOnCanvas(cur).rotation || 0) + 'deg) ' : '') + 'scale(1.06)' + curFlipT;
      const lbl = div.querySelector('.sn-builder-label');
      if (lbl) lbl.style.opacity = 1;
    });
    div.addEventListener('mouseleave', () => {
      const cur = S.elements.find(e => e.id === el.id);
      const curFlipT = cur ? ((cur.flipH ? ' scaleX(-1)' : '') + (cur.flipV ? ' scaleY(-1)' : '')) : '';
      const isActive = isPreview && el.actionType === 'filter' && S.previewActiveFilters.indexOf(el.actionValue) > -1;
      if (isActive) {
        const gI = (cur && cur.glowIntensity) || 1;
        const g1 = Math.round(8*gI), g2 = Math.round(20*gI), g3 = Math.round(40*gI);
        const gc = (cur && cur.glowColor) || el.glowColor;
        div.style.filter = `drop-shadow(0 0 ${g1}px ${gc}) drop-shadow(0 0 ${g2}px ${gc}) drop-shadow(0 0 ${g3}px ${gc}80)`;
      } else {
        div.style.filter = 'none';
      }
      div.style.transform = 'rotate(' + (cur ? (getElOnCanvas(cur).rotation || 0) : 0) + 'deg)' + curFlipT;
      const lbl = div.querySelector('.sn-builder-label');
      if (lbl) lbl.style.opacity = 0;
    });

    // Click: select (edit) or activate (preview)
    div.addEventListener('click', (e) => {
      if (isPreview) {
        if (el.actionType === 'link'   && el.actionValue) { window.open(el.actionValue, '_blank'); return; }
        if (el.actionType === 'anchor' && el.actionValue) {
          const t = document.getElementById(el.actionValue);
          if (t) t.scrollIntoView({ behavior: 'smooth' }); return;
        }
        if (el.actionType === 'filter' && el.actionValue) {
          const idx = S.previewActiveFilters.indexOf(el.actionValue);
          const cur = S.elements.find(e => e.id === el.id);
          const gI = (cur && cur.glowIntensity) || 1;
          const g1 = Math.round(8*gI), g2 = Math.round(20*gI), g3 = Math.round(40*gI);
          const gc = (cur && cur.glowColor) || el.glowColor;
          if (idx > -1) {
            S.previewActiveFilters.splice(idx, 1);
            div.style.filter = 'none';
          } else {
            S.previewActiveFilters.push(el.actionValue);
            div.style.filter = `drop-shadow(0 0 ${g1}px ${gc}) drop-shadow(0 0 ${g2}px ${gc}) drop-shadow(0 0 ${g3}px ${gc}80)`;
          }
          return;
        }
        return;
      }
      e.stopPropagation();
      S.selectedId = el.id;
      renderLeftPanel();
      // Update outlines without full canvas remount
      container.querySelectorAll('.sn-builder-el').forEach(d => {
        const eel = S.elements.find(e => e.id === d.dataset.id); if (!eel) return;
        d.style.outline = d.dataset.id === el.id ? '2px dashed ' + eel.glowColor : 'none';
        d.style.zIndex  = d.dataset.id === el.id ? 50 : 10;
      });
      container.querySelectorAll('.sn-bg-layer').forEach(d => { d.style.outline = 'none'; });
    });

    // Drag: smooth DOM-only updates during move, state commit on mouseup
    if (!isPreview) {
      div.addEventListener('mousedown', (e) => {
        e.preventDefault(); e.stopPropagation();
        const rect     = container.getBoundingClientRect();
        const startMx  = e.clientX, startMy = e.clientY;
        const curPos   = getElOnCanvas(el);
        const startEx  = curPos.x, startEy = curPos.y;
        // In mobile mode, mobileOnly elements write to el.x/y directly;
        // shared elements write to mobileOverride
        const writesToOverride = S.canvasMode === 'mobile' && el.onlyShowOn !== 'mobile';
        div.style.cursor = 'grabbing'; div.style.zIndex = 100; div.style.transition = 'none';

        const onMove = (ev) => {
          const newX = startEx + ((ev.clientX - startMx) / rect.width)  * 100;
          const newY = startEy + ((ev.clientY - startMy) / rect.height) * 100;
          if (writesToOverride) {
            if (!el.mobileOverride) el.mobileOverride = {};
            el.mobileOverride.x = newX; el.mobileOverride.y = newY;
          } else {
            el.x = newX; el.y = newY;
          }
          div.style.left = newX + '%'; div.style.top = newY + '%';
        };
        const onUp = () => {
          div.style.cursor     = 'grab';
          div.style.zIndex     = S.selectedId === el.id ? 50 : 10;
          div.style.transition = 'filter 0.35s ease, transform 0.25s ease';
          if (writesToOverride) {
            updateEl(el.id, { mobileOverride: { ...el.mobileOverride } });
          } else {
            updateEl(el.id, { x: el.x, y: el.y });
          }
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup',   onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup',   onUp);
      });
    }

    container.appendChild(div);
  });
}

// ── Render: canvas area ────────────────────────────────────────────────────────
function renderCanvas() {
  const canvasArea = document.getElementById('canvas-area');
  const container  = document.getElementById('scene-container');
  if (!canvasArea || !container) return;

  const isPreview = S.mode === 'preview';
  canvasArea.style.background = isPreview
    ? 'radial-gradient(ellipse at center, #0e0e1a 0%, #050508 100%)'
    : '#08080e';

  // Canvas dimensions + background color
  const activeAR = (S.mobileEnabled && S.canvasMode === 'mobile') ? S.mobileAspectRatio : S.aspectRatio;
  const [arW, arH] = activeAR.split('/').map(Number);
  const isPortrait = arH > arW;
  container.style.aspectRatio = activeAR;
  if (isPortrait) {
    // Height-based sizing: constrain to viewport so the canvas never overflows off-screen
    container.style.width    = 'auto';
    container.style.maxWidth = '100%';
    container.style.height   = '70vh';
    container.style.minHeight = '';
  } else {
    container.style.width    = '100%';
    container.style.maxWidth = '800px';
    container.style.height   = '';
    container.style.minHeight = '280px';
  }
  container.style.background  = isPreview ? S.previewBgColor : S.editBgColor;
  container.style.overflow    = 'visible';

  // Edge fade mask — Gaussian soft edges (same technique as Word's "Soft Edges")
  const fadeVal = S.edgeFade || 0;
  let fadeSvgEl = document.getElementById('snav-builder-fade-svg');
  if (fadeVal > 0) {
    const inset = +(fadeVal * 0.5).toFixed(5);
    const blur  = +(fadeVal * 0.15).toFixed(5);
    const rw    = +(1 - 2 * inset).toFixed(5);
    if (!fadeSvgEl) {
      fadeSvgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      fadeSvgEl.id = 'snav-builder-fade-svg';
      fadeSvgEl.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');
      fadeSvgEl.setAttribute('aria-hidden', 'true');
      document.body.appendChild(fadeSvgEl);
    }
    fadeSvgEl.innerHTML = `<defs><filter id="snav-builder-filt" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="${blur}"/></filter><mask id="snav-builder-mask" maskContentUnits="objectBoundingBox"><rect x="${inset}" y="${inset}" width="${rw}" height="${rw}" fill="white" filter="url(#snav-builder-filt)"/></mask></defs>`;
    container.style.mask = 'url(#snav-builder-mask)';
    container.style.webkitMask = 'url(#snav-builder-mask)';
  } else {
    if (fadeSvgEl) fadeSvgEl.remove();
    container.style.mask = '';
    container.style.webkitMask = '';
  }

  // Canvas mode toggle (only in edit mode, only when mobile is enabled)
  let modeToggle = document.getElementById('canvas-mode-toggle');
  if (S.mobileEnabled && !isPreview) {
    if (!modeToggle) {
      modeToggle = document.createElement('div');
      modeToggle.id = 'canvas-mode-toggle';
      Object.assign(modeToggle.style, { display:'flex', gap:'4px', marginBottom:'10px', background:'#0c0c16', borderRadius:'8px', padding:'3px', border:'1px solid #141422' });
      canvasArea.insertBefore(modeToggle, container);
    }
    const btnStyle = (active) => `padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-family:'Space Mono',monospace;transition:all 0.15s;background:${active?'#1a1a2e':'transparent'};color:${active?'#FFD700':'#8888aa'};font-weight:${active?700:400};`;
    modeToggle.innerHTML = `
      <button id="cm-desktop" style="${btnStyle(S.canvasMode==='desktop')}">Desktop ${S.aspectRatio}</button>
      <button id="cm-mobile"  style="${btnStyle(S.canvasMode==='mobile')}">Mobile ${S.mobileAspectRatio}</button>
    `;
    document.getElementById('cm-desktop').onclick = () => { S.canvasMode = 'desktop'; renderCanvas(); renderLeftPanel(); };
    document.getElementById('cm-mobile').onclick  = () => { S.canvasMode = 'mobile';  renderCanvas(); renderLeftPanel(); };
  } else if (modeToggle) {
    modeToggle.remove();
  }

  mountBackgroundLayers(container);

  // Empty state placeholder
  let ph = container.querySelector('.sn-placeholder');
  if (!S.backgrounds.length && S.elements.length === 0) {
    if (!ph) {
      ph = document.createElement('div'); ph.className = 'sn-placeholder';
      Object.assign(ph.style, { position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#505070', gap:'10px' });
      ph.innerHTML = '<div style="font-size:42px;opacity:0.5">✦</div><div style="font-size:13px;text-align:center;line-height:1.7;max-width:240px">Upload a transparent background PNG, then add character images to position them.</div>';
      container.appendChild(ph);
    }
  } else { if (ph) ph.remove(); }

  mountSceneElements(container);

  // Preview hint
  let hint = document.getElementById('preview-hint');
  if (isPreview && S.elements.length > 0) {
    if (!hint) {
      hint = document.createElement('div'); hint.id = 'preview-hint';
      Object.assign(hint.style, { marginTop:'14px', fontSize:'11px', color:'#667799', fontFamily:"'Space Mono', monospace", textAlign:'center' });
      hint.textContent = 'hover to glow · click to activate';
      canvasArea.appendChild(hint);
    }
  } else { if (hint) hint.remove(); }
}
