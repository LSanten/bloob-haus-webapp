site:
  name: "Leon's Marbles"
  description: "Thoughts, notes, and explorations"
  url: "https://marbles.bloob.haus"
  author: "Leon"
  language: "en-us"

content:
  repo: "LSanten/LSanten.github.io"
  branch: "master"
  path: "_mms-md"
  publish_mode: "blocklist"
  blocklist_tag: "private-marble-keep-from-public"
  exclude_files:
    - "ALL"

permalinks:
  strategy: "preserve-case"

theme: "warm-kitchen"

visualizers:
  - checkbox-tracker
  - graph

features:
  rss: true
  sitemap: true
  robots_txt: true
  search: true
  backlinks: true
  og_images: true
  tags: true
  custom_404: true

media:
  optimize: true
  formats: ["webp", "jpeg"]
  widths: [600, 1200]
